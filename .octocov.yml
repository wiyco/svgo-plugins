coverage:
  paths:
    - coverage/lcov.info
  acceptable: 100%
  badge:
    path: docs/assets/coverage.svg
codeToTestRatio:
  code:
    - "packages/*/src/**/*.{ts,tsx}"
    - "apps/*/src/**/*.{ts,tsx}"
    - "!**/src/**/index.ts"
    - "!**/*.d.ts"
  test:
    - "packages/*/__tests__/**/*.test.{ts,tsx}"
    - "apps/*/__tests__/**/*.test.{ts,tsx}"
  badge:
    path: docs/assets/code-to-test-ratio.svg
testExecutionTime:
  if: "env.OCTOCOV_RUN_MODE == 'check'"
diff:
  if: "env.OCTOCOV_RUN_MODE == 'check'"
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: "env.OCTOCOV_RUN_MODE == 'check' && is_pull_request"
  deletePrevious: true
report:
  if: "env.OCTOCOV_RUN_MODE == 'check' && is_default_branch"
  datastores:
    - artifact://${GITHUB_REPOSITORY}
summary:
  if: "env.OCTOCOV_RUN_MODE == 'check'"
push:
  if: "env.OCTOCOV_RUN_MODE == 'badge' && is_default_branch"
  message: "chore: update metric badges [skip ci]"
