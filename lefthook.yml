lefthook: pnpm exec lefthook

pre-commit:
  parallel: true
  jobs:
    - name: root
      group:
        piped: true
        jobs:
          - name: lint root
            glob:
              - "*.{js,cjs,mjs,jsx,ts,cts,mts,tsx}"
              - "**/*.{js,cjs,mjs,jsx,ts,cts,mts,tsx}"
            exclude:
              - "apps/**"
              - "packages/**"
            run: pnpm exec oxlint -c .oxlintrc.json --fix {staged_files}
            stage_fixed: true
          - name: format root
            glob:
              - "*.{js,cjs,mjs,jsx,ts,cts,mts,tsx,md,json,yml,yaml}"
              - "**/*.{js,cjs,mjs,jsx,ts,cts,mts,tsx,md,json,yml,yaml}"
            exclude:
              - "apps/**"
              - "packages/**"
            run: pnpm exec oxfmt -c .oxfmtrc.json {staged_files}
            stage_fixed: true

    - name: packages
      root: "packages/"
      group:
        piped: true
        jobs:
          - name: lint packages
            glob: "**/*.{js,cjs,mjs,jsx,ts,cts,mts,tsx}"
            run: pnpm exec oxlint --fix {staged_files}
            stage_fixed: true
          - name: format packages
            glob: "**/*.{js,cjs,mjs,jsx,ts,cts,mts,tsx,md,json,yml,yaml}"
            run: pnpm exec oxfmt {staged_files}
            stage_fixed: true

    - name: apps
      root: "apps/"
      group:
        piped: true
        jobs:
          - name: lint apps
            glob: "**/*.{js,cjs,mjs,jsx,ts,cts,mts,tsx}"
            run: pnpm exec oxlint --fix {staged_files}
            stage_fixed: true
          - name: format apps
            glob: "**/*.{js,cjs,mjs,jsx,ts,cts,mts,tsx,md,json,yml,yaml}"
            run: pnpm exec oxfmt {staged_files}
            stage_fixed: true

    - name: typecheck
      run: pnpm exec tsgo -b

post-merge:
  jobs:
    - name: install deps
      run: pnpm install --frozen-lockfile
      glob: pnpm-lock.yaml
